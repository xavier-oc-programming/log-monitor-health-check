name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC daily — the morning health check

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v
        env:
          EMAIL_USERNAME: test@example.com
          EMAIL_PASSWORD: testpassword

  run_report:
    needs: test
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download Hadoop log dataset
        run: |
          curl -L -o Hadoop.zip "https://zenodo.org/records/8196385/files/Hadoop.zip?download=1"
          mkdir -p sample_data
          unzip -q Hadoop.zip -d sample_data
          rm Hadoop.zip
      - name: Prepare config
        run: cp config.yaml.example config.yaml
      - name: Run morning health check
        run: python run_report.py --dry-run
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      - name: Run Slack alert check
        run: python run_alert.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Zip and deploy
        run: |
          zip -rq deploy.zip \
            main.py run_analysis.py run_report.py run_alert.py preview_email.py \
            hadoop_loader.py log_parser.py analyser.py \
            visualise.py email_builder.py email_sender.py slack_sender.py \
            config_loader.py conftest.py \
            requirements.txt \
            templates/ plots/ reports/
          TOKEN=$(az account get-access-token --query accessToken -o tsv)
          curl -X POST \
            "https://${{ secrets.AZURE_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --silent --show-error
